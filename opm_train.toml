[project]
name = "opm-train"
data_dir = ".opm_train"

[provider]
profile = "openrouter"

[provider.openrouter]
base_url = "https://openrouter.ai/api/v1"
api_key_env = "OPENROUTER_API_KEY"
model = "openai/gpt-4o-mini"
timeout_seconds = 120
max_retries = 8
retry_backoff_seconds = 1.0
temperature = 0.2
max_tokens = 4096
headers = { "HTTP-Referer" = "https://github.com/opencompany/opm-train", "X-Title" = "opm-train" }

[provider.tinker]
base_url = "https://tinker.thinkingmachines.dev/services/tinker-prod/oai/api/v1"
api_key_env = "TINKER_API_KEY"
model = "tinker://replace-with-sampler-checkpoint"
timeout_seconds = 120
max_retries = 2
retry_backoff_seconds = 1.0
temperature = 0.2
max_tokens = 4096

[provider.custom]
base_url = "https://api.openai.com/v1"
api_key_env = "OPENAI_API_KEY"
model = "gpt-4o-mini"
timeout_seconds = 120
max_retries = 2
retry_backoff_seconds = 1.0
temperature = 0.2
max_tokens = 4096

[runtime.limits]
max_children_per_agent = 6
max_active_agents = 8
max_root_steps = 64
max_agent_steps = 48
max_protocol_retries = 2
protocol_retry_backoff_seconds = 0.25

[runtime.context]
enabled = true
auto_compress_ratio = 0.8
keep_pinned_messages = 1
max_context_tokens = 96000

[runtime.tools]
root_tools = [
  "shell",
  "compress_context",
  "wait_time",
  "list_mcp_servers",
  "list_mcp_resources",
  "read_mcp_resource",
  "list_agent_runs",
  "get_agent_run",
  "spawn_agent",
  "cancel_agent",
  "steer_agent",
  "list_tool_runs",
  "get_tool_run",
  "wait_run",
  "cancel_tool_run",
  "finish",
]
worker_tools = [
  "shell",
  "compress_context",
  "wait_time",
  "list_mcp_servers",
  "list_mcp_resources",
  "read_mcp_resource",
  "list_agent_runs",
  "get_agent_run",
  "spawn_agent",
  "cancel_agent",
  "steer_agent",
  "list_tool_runs",
  "get_tool_run",
  "wait_run",
  "cancel_tool_run",
  "finish",
]
list_default_limit = 20
list_max_limit = 200
shell_timeout_seconds = 300
wait_run_timeout_seconds = 20
shell_inline_wait_seconds = 5
wait_time_min_seconds = 10
wait_time_max_seconds = 60

[extensions]
sandbox_enabled = false
mcp_enabled = false
skills_enabled = false
